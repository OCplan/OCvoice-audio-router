name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: OCvoice-Audio-Router-macOS-arm64
            binary: ocvoice-audio-router
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: OCvoice-Audio-Router-macOS-x64
            binary: ocvoice-audio-router
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: OCvoice-Audio-Router-Windows
            binary: ocvoice-audio-router.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      # macOS: create .app bundle, sign, notarize, create .dmg
      - name: Create macOS .app and .dmg
        if: runner.os == 'macOS'
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_BINARY: ${{ matrix.binary }}
          TAG_NAME: ${{ github.ref_name }}
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          APP_NAME="OCvoice Audio Router.app"
          mkdir -p "${APP_NAME}/Contents/MacOS"
          mkdir -p "${APP_NAME}/Contents/Resources"

          # Copy binary
          cp "target/${BUILD_TARGET}/release/${BUILD_BINARY}" \
             "${APP_NAME}/Contents/MacOS/ocvoice-audio-router"
          chmod +x "${APP_NAME}/Contents/MacOS/ocvoice-audio-router"

          # Copy Info.plist and update version from tag
          cp resources/macos/Info.plist "${APP_NAME}/Contents/Info.plist"
          if [[ "${TAG_NAME}" == v* ]]; then
            VERSION="${TAG_NAME#v}"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "${APP_NAME}/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "${APP_NAME}/Contents/Info.plist"
          fi

          # --- Code Signing ---
          if [[ -n "${APPLE_DEVELOPER_ID_CERT_BASE64}" ]]; then
            echo "Setting up code signing..."

            # Create temporary keychain
            KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
            KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
            security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
            security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
            security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

            # Import certificate
            CERT_PATH="${RUNNER_TEMP}/certificate.p12"
            echo "${APPLE_DEVELOPER_ID_CERT_BASE64}" | base64 --decode > "${CERT_PATH}"
            security import "${CERT_PATH}" \
              -P "${APPLE_DEVELOPER_ID_CERT_PASSWORD}" \
              -A \
              -t cert \
              -f pkcs12 \
              -k "${KEYCHAIN_PATH}"
            security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
            security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain

            # Find signing identity
            IDENTITY=$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
            echo "Signing with identity: ${IDENTITY}"

            # Sign the binary and app bundle
            codesign --force --options runtime \
              --entitlements resources/macos/entitlements.plist \
              --sign "${IDENTITY}" \
              --timestamp \
              "${APP_NAME}/Contents/MacOS/ocvoice-audio-router"

            codesign --force --options runtime \
              --entitlements resources/macos/entitlements.plist \
              --sign "${IDENTITY}" \
              --timestamp \
              "${APP_NAME}"

            echo "Code signing complete. Verifying..."
            codesign --verify --deep --strict --verbose=2 "${APP_NAME}"

            # --- Create DMG ---
            mkdir -p dmg_contents
            cp -R "${APP_NAME}" dmg_contents/
            ln -s /Applications dmg_contents/Applications

            hdiutil create -volname "OCvoice Audio Router" \
              -srcfolder dmg_contents \
              -ov -format UDZO \
              "${ARTIFACT_NAME}.dmg"

            # Sign the DMG
            codesign --force --sign "${IDENTITY}" --timestamp "${ARTIFACT_NAME}.dmg"

            # --- Notarization via App Store Connect API key ---
            if [[ -n "${APPLE_API_KEY_BASE64}" ]]; then
              echo "Setting up App Store Connect API key..."
              API_KEY_DIR="${RUNNER_TEMP}/private_keys"
              mkdir -p "${API_KEY_DIR}"
              echo "${APPLE_API_KEY_BASE64}" | base64 --decode > "${API_KEY_DIR}/AuthKey_${APPLE_API_KEY_ID}.p8"

              echo "Submitting for notarization..."
              xcrun notarytool submit "${ARTIFACT_NAME}.dmg" \
                --key "${API_KEY_DIR}/AuthKey_${APPLE_API_KEY_ID}.p8" \
                --key-id "${APPLE_API_KEY_ID}" \
                --issuer "${APPLE_API_ISSUER_ID}" \
                --wait

              echo "Stapling notarization ticket..."
              xcrun stapler staple "${ARTIFACT_NAME}.dmg"

              rm -rf "${API_KEY_DIR}"
            fi

            # Clean up keychain
            security delete-keychain "${KEYCHAIN_PATH}"
          else
            echo "No signing certificate found, creating unsigned DMG..."
            mkdir -p dmg_contents
            cp -R "${APP_NAME}" dmg_contents/
            ln -s /Applications dmg_contents/Applications

            hdiutil create -volname "OCvoice Audio Router" \
              -srcfolder dmg_contents \
              -ov -format UDZO \
              "${ARTIFACT_NAME}.dmg"
          fi

      # Windows: just rename the exe
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: bash
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          BUILD_TARGET: ${{ matrix.target }}
          BUILD_BINARY: ${{ matrix.binary }}
        run: |
          cp "target/${BUILD_TARGET}/release/${BUILD_BINARY}" \
             "${ARTIFACT_NAME}.exe"

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: "${{ matrix.artifact }}.dmg"

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: "${{ matrix.artifact }}.exe"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Audio Router ${{ github.ref_name }}"
          body: |
            ## OCvoice Audio Router

            Download the right version for your system:

            | Platform | File |
            |---|---|
            | **macOS (Apple Silicon — M1/M2/M3/M4)** | `OCvoice-Audio-Router-macOS-arm64.dmg` |
            | **macOS (Intel)** | `OCvoice-Audio-Router-macOS-x64.dmg` |
            | **Windows** | `OCvoice-Audio-Router-Windows.exe` |

            ### macOS
            1. Download and open the `.dmg` file
            2. Drag **OCvoice Audio Router** to the **Applications** folder
            3. Double-click to launch — the app runs in the background via the menu bar

            ### Windows
            1. Download and run the `.exe` file
            2. Click "More info" → "Run anyway" if SmartScreen blocks it
            3. Done — starts automatically on login

            The app runs in the background. Your OCvoice broadcast page detects it automatically.
          files: artifacts/**/*
